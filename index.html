<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D0A14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>VIGIL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --obsidian:    #0D0A14;
    --obsidian-2:  #13101E;
    --obsidian-3:  #1C1828;
    --gold:        #C9A84C;
    --gold-dim:    #8a6f2e;
    --gold-glow:   rgba(201,168,76,0.15);
    --text:        #E8E0D0;
    --text-dim:    #6B6070;
    --green:       #3DBA7A;
    --amber:       #F5A623;
    --red:         #E53E3E;
    --font-display:'Cinzel', serif;
    --font-ui:     'DM Mono', monospace;
    --tab-h:       60px;
    --safe-b:      env(safe-area-inset-bottom, 0px);
    --safe-t:      env(safe-area-inset-top, 0px);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--obsidian);
    color: var(--text);
    font-family: var(--font-ui);
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: -webkit-fill-available;
  }

  /* ── Header ─────────────────────────────────────── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: calc(12px + var(--safe-t)) 20px 12px;
    background: var(--obsidian-2);
    border-bottom: 1px solid rgba(201,168,76,0.1);
    flex-shrink: 0;
    position: relative;
  }
  #header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }
  #wordmark {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  #wordmark h1 {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    line-height: 1;
  }
  #wordmark span {
    font-size: 8px;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  #health-cluster {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #health-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  #health-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    transition: background 0.4s, box-shadow 0.4s;
  }
  #health-dot.degraded { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  #health-dot.dead     { background: var(--red);   box-shadow: 0 0 8px var(--red); }

  /* ── Viewport ────────────────────────────────────── */
  #viewport {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--obsidian);
  }
  .slot {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .slot.active { opacity: 1; pointer-events: all; }

  /* ── Loader ──────────────────────────────────────── */
  #loader {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: var(--obsidian);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    z-index: 20;
  }
  #loader.on { opacity: 1; pointer-events: all; }
  .ring {
    width: 36px; height: 36px;
    border: 1.5px solid rgba(201,168,76,0.15);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loader-name {
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--gold-dim);
    text-transform: uppercase;
  }

  /* ── Tab Bar ─────────────────────────────────────── */
  #tabs {
    display: flex;
    height: calc(var(--tab-h) + var(--safe-b));
    padding-bottom: var(--safe-b);
    background: var(--obsidian-2);
    border-top: 1px solid rgba(201,168,76,0.08);
    flex-shrink: 0;
    position: relative;
  }
  #tabs::before {
    content: '';
    position: absolute;
    top: -1px; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }
  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    cursor: pointer;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: var(--font-ui);
    font-size: 8px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: color 0.2s;
    position: relative;
    padding-bottom: 4px;
  }
  .tab svg { width: 20px; height: 20px; stroke-width: 1.5; transition: stroke 0.2s; }
  .tab:active { opacity: 0.6; }
  .tab.active { color: var(--gold); }
  .tab.active svg { filter: drop-shadow(0 0 4px rgba(201,168,76,0.5)); }
  .tab.active::after {
    content: '';
    position: absolute;
    top: 0; left: 25%; right: 25%;
    height: 1.5px;
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold);
  }

  /* ── Fault Screen ────────────────────────────────── */
  .fault {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    padding: 32px;
    text-align: center;
  }
  .fault-code {
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--red);
    text-transform: uppercase;
  }
  .fault-msg { font-size: 11px; color: var(--text-dim); line-height: 1.6; }
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="wordmark">
      <h1>VIGIL</h1>
      <span>Multi-Sensor Awareness</span>
    </div>
    <div id="health-cluster">
      <span id="health-label">NOMINAL</span>
      <div id="health-dot"></div>
    </div>
  </div>

  <div id="viewport">
    <div class="slot" id="slot-liminal"></div>
    <div class="slot" id="slot-amplify"></div>
    <div class="slot" id="slot-nightvision"></div>
    <div id="loader">
      <div class="ring"></div>
      <div id="loader-name">Loading</div>
    </div>
  </div>

  <nav id="tabs">
    <button class="tab active" data-module="liminal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <rect x="3" y="3" width="18" height="18" rx="1.5"/>
        <path d="M9 3v18M15 3v18M3 9h18M3 15h18"/>
      </svg>
      Liminal
    </button>
    <button class="tab" data-module="amplify">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M12 3v18M8 7v10M4 11v2M16 5v14M20 10v4"/>
      </svg>
      Amplify
    </button>
    <button class="tab" data-module="nightvision">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="12" cy="12" r="3.5"/>
        <circle cx="12" cy="12" r="7" stroke-dasharray="2 3"/>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
      </svg>
      Night Vision
    </button>
  </nav>

</div>
<script type="module">

// ── MediaStream Arbitration ──────────────────────────────────────────────────
const Media = {
  _streams: new Map(),
  async acquire(id, constraints) {
    if (this._streams.has(id)) return this._streams.get(id)
    const stream = await navigator.mediaDevices.getUserMedia(constraints)
    this._streams.set(id, stream)
    return stream
  },
  release(id) {
    const s = this._streams.get(id)
    if (!s) return
    s.getTracks().forEach(t => t.stop())
    this._streams.delete(id)
  },
  health() { return { streams: this._streams.size, active: [...this._streams.keys()] } }
}

// ── RAF Arbitration ──────────────────────────────────────────────────────────
const RAF = {
  _loops: new Map(),
  start(id, fn) {
    this.stop(id)
    let alive = true
    const tick = () => { if (alive) { fn(); this._loops.set(id, requestAnimationFrame(tick)) } }
    this._loops.set(id, requestAnimationFrame(tick))
    return () => { alive = false; this.stop(id) }
  },
  stop(id) {
    const r = this._loops.get(id)
    if (r != null) { cancelAnimationFrame(r); this._loops.delete(id) }
  },
  health() { return { loops: this._loops.size, ids: [...this._loops.keys()] } }
}

// ── Telemetry ────────────────────────────────────────────────────────────────
const Telemetry = {
  _fns: new Map(),
  register(id, fn) { this._fns.set(id, fn) },
  async report() {
    const out = {}
    for (const [id, fn] of this._fns) {
      try { out[id] = fn() } catch(e) { out[id] = { status: 'dead', error: e.message } }
    }
    return out
  }
}

// ── Module Loaders ───────────────────────────────────────────────────────────
const loaders = {
  async liminal(el)      { const {m} = await import('./modules/liminal/engine.js');      return m(el, Media, RAF) },
  async amplify(el)      { const {m} = await import('./modules/amplify/engine.js');      return m(el, Media) },
  async nightvision(el)  { const {m} = await import('./modules/nightvision/engine.js'); return m(el, Media, RAF) },
}
const instances = {}

// ── Router ───────────────────────────────────────────────────────────────────
let active = null
const $loader = document.getElementById('loader')
const $loaderName = document.getElementById('loader-name')
const $dot = document.getElementById('health-dot')
const $label = document.getElementById('health-label')

function showLoader(name) { $loaderName.textContent = name; $loader.classList.add('on') }
function hideLoader()     { $loader.classList.remove('on') }

async function go(id) {
  if (active === id) return

  if (active) {
    document.getElementById(`slot-${active}`).classList.remove('active')
    try { instances[active]?.destroy() } catch(_) {}
    Media.release(active)
    RAF.stop(active)
  }

  active = id
  const slot = document.getElementById(`slot-${id}`)
  slot.innerHTML = ''
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.module === id))
  showLoader(id.toUpperCase())

  try {
    instances[id] = await loaders[id](slot)
    Telemetry.register(id, () => instances[id].health())
    slot.classList.add('active')
  } catch(e) {
    slot.innerHTML = `<div class="fault">
      <div class="fault-code">Module Fault — ${id}</div>
      <div class="fault-msg">${e.message}<br><br>Check permissions and reload.</div>
    </div>`
    slot.classList.add('active')
  } finally {
    hideLoader()
  }
}

// ── Tabs ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t =>
  t.addEventListener('click', () => go(t.dataset.module))
)

// ── Health loop ───────────────────────────────────────────────────────────────
setInterval(async () => {
  const r = await Telemetry.report()
  const statuses = Object.values(r).map(m => m?.status)
  if (statuses.includes('dead'))     { $dot.className = 'dead';     $label.textContent = 'FAULT' }
  else if (statuses.includes('degraded')) { $dot.className = 'degraded'; $label.textContent = 'DEGRADED' }
  else                               { $dot.className = '';          $label.textContent = 'NOMINAL' }
}, 5000)

// ── PWA ───────────────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{})

// ── Boot ──────────────────────────────────────────────────────────────────────
go('liminal')
</script>
</body>
</html>
