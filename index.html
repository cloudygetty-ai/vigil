<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0c0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VIGIL">
<link rel="manifest" href="manifest.json">
<title>VIGIL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<!-- Prefetch all three modules so switching is instant -->
<link rel="prefetch" href="liminal.html">
<link rel="prefetch" href="amplify.html">
<link rel="prefetch" href="nightvision.html">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  /* Stainless steel */
  --s0:#04070a;
  --s1:#090d12;
  --s2:#0f1520;
  --s3:#16202e;
  --s4:#1e2d3d;
  --s5:#283c50;
  --shine:rgba(255,255,255,0.055);

  /* Painted glass accents */
  --cyan:#00d4ff;
  --cyan-g:rgba(0,212,255,0.1);
  --cyan-b:rgba(0,212,255,0.18);
  --violet:#a855f7;
  --violet-g:rgba(168,85,247,0.1);
  --violet-b:rgba(168,85,247,0.18);
  --lime:#22d66c;
  --lime-g:rgba(34,214,108,0.1);
  --lime-b:rgba(34,214,108,0.18);

  /* Status */
  --ok:#22d66c;
  --warn:#f59e0b;
  --err:#ef4444;

  /* Text */
  --tx0:#dde6f0;
  --tx1:#7a8fa6;
  --tx2:#2e4057;

  /* Active tab (set via JS) */
  --ac:var(--cyan);
  --ac-g:var(--cyan-g);
  --ac-b:var(--cyan-b);

  --f-head:"Bebas Neue",sans-serif;
  --f-ui:"DM Mono",monospace;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}

html,body{
  width:100%;height:100%;
  background:var(--s0);
  color:var(--tx0);
  font-family:var(--f-ui);
  overflow:hidden;
}

#app{
  display:flex;flex-direction:column;
  height:100vh;height:-webkit-fill-available;
}

/* ── Header ── */
#hdr{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--safe-t) + 10px) 16px 10px;
  background:
    linear-gradient(180deg,var(--s3) 0%,var(--s2) 100%);
  border-bottom:1px solid var(--s4);
  position:relative;z-index:10;
  min-height:calc(var(--safe-t) + 52px);
}
/* Steel top highlight */
#hdr::before{
  content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--shine) 40%,rgba(255,255,255,0.1) 50%,var(--shine) 60%,transparent);
}
/* Active color accent line */
#hdr::after{
  content:"";position:absolute;bottom:-1px;left:0;right:0;height:1.5px;
  background:var(--ac);
  box-shadow:0 0 8px var(--ac);
  opacity:0.6;
  transition:background .35s,box-shadow .35s;
}

.hdr-left{display:flex;align-items:center;gap:10px}

/* Icon badge */
.hdr-badge{
  width:36px;height:36px;border-radius:9px;
  background:var(--ac);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 16px var(--ac-b),inset 0 1px 0 rgba(255,255,255,0.2);
  transition:background .35s,box-shadow .35s;
  flex-shrink:0;
}
.hdr-badge svg{width:18px;height:18px;stroke:#000;stroke-width:2.5;fill:none}

.hdr-text{display:flex;flex-direction:column;gap:0}
.hdr-name{
  font-family:var(--f-head);
  font-size:27px;line-height:1;letter-spacing:.14em;
  color:var(--tx0);
  transition:text-shadow .35s;
}
.hdr-sub{
  font-size:7px;letter-spacing:.28em;
  color:var(--ac);opacity:.65;
  text-transform:uppercase;
  transition:color .35s;
  margin-top:1px;
}

/* Status pill */
.pill{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;
  background:var(--s2);
  border:1px solid var(--s4);
  border-radius:99px;
}
.pill-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--ok);
  box-shadow:0 0 5px var(--ok);
  transition:background .3s,box-shadow .3s;
}
.pill-dot.warn{background:var(--warn);box-shadow:0 0 5px var(--warn)}
.pill-dot.err{background:var(--err);box-shadow:0 0 5px var(--err);animation:blink .6s step-end infinite}
.pill-txt{font-size:7.5px;letter-spacing:.16em;color:var(--tx1);text-transform:uppercase}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── Viewport ── */
#vp{
  flex:1;position:relative;overflow:hidden;
  background:var(--s0);
}

.slot{
  position:absolute;inset:0;
  width:100%;height:100%;
  border:none;
  opacity:0;pointer-events:none;
  transition:opacity .2s ease;
  background:var(--s0);
}
.slot.on{opacity:1;pointer-events:all}

/* Loading overlay */
.loader{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  background:var(--s0);
  z-index:8;
  transition:opacity .25s;
}
.loader.gone{opacity:0;pointer-events:none}
.loader-ring{
  width:38px;height:38px;
  border:1.5px solid var(--s4);
  border-top-color:var(--ac);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
.loader-label{
  font-family:var(--f-head);font-size:16px;
  letter-spacing:.3em;color:var(--tx2);
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Tab bar ── */
#tabs{
  flex-shrink:0;
  display:flex;
  height:calc(58px + var(--safe-b));
  padding-bottom:var(--safe-b);
  background:linear-gradient(0deg,var(--s3) 0%,var(--s2) 100%);
  border-top:1px solid var(--s4);
  position:relative;z-index:10;
}
/* Steel bottom edge */
#tabs::before{
  content:"";position:absolute;
  bottom:var(--safe-b);left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--shine),transparent);
}

/* Sliding indicator */
.indicator{
  position:absolute;top:0;
  width:33.3333%;height:2px;
  background:var(--ac);
  box-shadow:0 0 10px var(--ac);
  transition:transform .32s cubic-bezier(.34,1.2,.64,1),background .35s,box-shadow .35s;
}

.tab{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
  background:transparent;border:none;
  color:var(--tx2);
  font-family:var(--f-ui);font-size:7.5px;
  letter-spacing:.18em;text-transform:uppercase;
  cursor:pointer;position:relative;
  transition:color .2s;
  -webkit-tap-highlight-color:transparent;
  outline:none;user-select:none;
}
.tab-ic{
  width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
  border-radius:7px;
  transition:background .2s,box-shadow .2s,transform .12s;
}
.tab-ic svg{
  width:17px;height:17px;
  stroke:currentColor;stroke-width:1.8;fill:none;
}
.tab:active .tab-ic{transform:scale(.84)}
.tab.on{color:var(--ac)}
.tab.on .tab-ic{
  background:var(--ac-g);
  box-shadow:0 0 14px var(--ac-b);
}

/* Ripple on tap */
.tab::after{
  content:"";
  position:absolute;inset:4px;border-radius:8px;
  background:var(--ac);
  opacity:0;transition:opacity .18s;
}
.tab:active::after{opacity:.07}
</style>
</head>
<body>
<div id="app">

  <div id="hdr">
    <div class="hdr-left">
      <div class="hdr-badge" id="badge">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2z"/><polyline points="2 7 12 12 22 7"/><line x1="12" y1="12" x2="12" y2="22"/></svg>
      </div>
      <div class="hdr-text">
        <div class="hdr-name">VIGIL</div>
        <div class="hdr-sub" id="sub">Multi-Sensor Awareness</div>
      </div>
    </div>
    <div class="pill">
      <div class="pill-dot" id="dot"></div>
      <span class="pill-txt" id="ptxt">LOADING</span>
    </div>
  </div>

  <div id="vp">
    <div class="loader" id="ld-liminal">
      <div class="loader-ring"></div>
      <div class="loader-label">LIMINAL</div>
    </div>
    <div class="loader gone" id="ld-amplify">
      <div class="loader-ring"></div>
      <div class="loader-label">AMPLIFY</div>
    </div>
    <div class="loader gone" id="ld-nightvision">
      <div class="loader-ring"></div>
      <div class="loader-label">NIGHT VISION</div>
    </div>

    <iframe class="slot" id="f-liminal"
      src="liminal.html"
      sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-downloads allow-pointer-lock"
      allow="camera;microphone;geolocation;magnetometer;gyroscope;accelerometer;device-orientation;fullscreen;display-capture"
      allowfullscreen loading="eager"></iframe>

    <iframe class="slot" id="f-amplify"
      sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-downloads"
      allow="camera;microphone;autoplay"
      allowfullscreen loading="lazy"></iframe>

    <iframe class="slot" id="f-nightvision"
      sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-downloads allow-pointer-lock"
      allow="camera;microphone;geolocation;magnetometer;gyroscope;accelerometer;device-orientation;fullscreen"
      allowfullscreen loading="lazy"></iframe>
  </div>

  <nav id="tabs">
    <div class="indicator" id="ind"></div>

    <button class="tab on" data-id="liminal" data-i="0"
            data-ac="#00d4ff" data-ag="rgba(0,212,255,0.1)" data-ab="rgba(0,212,255,0.18)"
            data-sub="Hidden Door Detection">
      <div class="tab-ic">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>
      </div>
      Liminal
    </button>

    <button class="tab" data-id="amplify" data-i="1"
            data-ac="#a855f7" data-ag="rgba(168,85,247,0.1)" data-ab="rgba(168,85,247,0.18)"
            data-sub="Audio DSP Engine">
      <div class="tab-ic">
        <svg viewBox="0 0 24 24"><polyline points="2 12 6 4 10 17 14 7 18 12 22 12"/></svg>
      </div>
      Amplify
    </button>

    <button class="tab" data-id="nightvision" data-i="2"
            data-ac="#22d66c" data-ag="rgba(34,214,108,0.1)" data-ab="rgba(34,214,108,0.18)"
            data-sub="NVG Camera System">
      <div class="tab-ic">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.5"/><circle cx="12" cy="12" r="7.5" stroke-dasharray="3 2.5"/><line x1="12" y1="2" x2="12" y2="4.5"/><line x1="12" y1="19.5" x2="12" y2="22"/><line x1="2" y1="12" x2="4.5" y2="12"/><line x1="19.5" y1="12" x2="22" y2="12"/></svg>
      </div>
      Night Vision
    </button>
  </nav>
</div>

<script>
const $ = id => document.getElementById(id);
const root = document.documentElement;

const CFG = {
  liminal:     { i:0, src:'liminal.html',     ac:'#00d4ff', ag:'rgba(0,212,255,0.1)',    ab:'rgba(0,212,255,0.18)',    sub:'Hidden Door Detection' },
  amplify:     { i:1, src:'amplify.html',     ac:'#a855f7', ag:'rgba(168,85,247,0.1)',  ab:'rgba(168,85,247,0.18)',  sub:'Audio DSP Engine' },
  nightvision: { i:2, src:'nightvision.html', ac:'#22d66c', ag:'rgba(34,214,108,0.1)',  ab:'rgba(34,214,108,0.18)',  sub:'NVG Camera System' },
};

const loaded = new Set();
let active = null;

function setTheme(c) {
  root.style.setProperty('--ac',  c.ac);
  root.style.setProperty('--ac-g', c.ag);
  root.style.setProperty('--ac-b', c.ab);
  $('badge').style.background = c.ac;
  $('badge').style.boxShadow = `0 0 16px ${c.ab}, inset 0 1px 0 rgba(255,255,255,0.2)`;
  $('sub').textContent = c.sub;
  $('sub').style.color = c.ac;
  $('ind').style.transform = `translateX(${c.i * 100}%)`;
  $('ind').style.background = c.ac;
  $('ind').style.boxShadow = `0 0 10px ${c.ac}`;
}

function setStatus(state, txt) {
  const dot = $('dot');
  dot.className = 'pill-dot' + (state === 'warn' ? ' warn' : state === 'err' ? ' err' : '');
  $('ptxt').textContent = txt;
}

function activate(id) {
  if (active === id) return;
  const c = CFG[id];

  // Hide previous
  if (active) {
    $('f-' + active).classList.remove('on');
  }

  active = id;
  setTheme(c);

  // Tab states
  document.querySelectorAll('.tab').forEach(t => {
    const on = t.dataset.id === id;
    t.classList.toggle('on', on);
    t.style.setProperty('--ac', on ? c.ac : '');
    t.style.setProperty('--ac-g', on ? c.ag : '');
    t.style.setProperty('--ac-b', on ? c.ab : '');
  });

  // Show/hide loaders
  Object.keys(CFG).forEach(k => {
    const ld = $('ld-' + k);
    if (ld) ld.classList.toggle('gone', k !== id || loaded.has(id));
  });

  // Lazy-load src on first visit
  const frame = $('f-' + id);
  if (!loaded.has(id) && !frame.src) {
    frame.src = c.src;
  }

  frame.onload = () => {
    loaded.add(id);
    const ld = $('ld-' + id);
    if (ld) ld.classList.add('gone');
    setStatus('ok', 'NOMINAL');
  };
  frame.onerror = () => setStatus('err', 'FAULT');

  frame.classList.add('on');
  if (navigator.vibrate) navigator.vibrate(7);
  setStatus(loaded.has(id) ? 'ok' : 'warn', loaded.has(id) ? 'NOMINAL' : 'LOADING');
}

// Tab clicks
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('pointerdown', () => {
    if (navigator.vibrate) navigator.vibrate(5);
  });
  btn.addEventListener('click', () => activate(btn.dataset.id));
});

// Swipe to switch tabs
let tx = 0, ty = 0;
const vp = $('vp');
vp.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:true});
vp.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.4) {
    const keys = Object.keys(CFG);
    const cur = keys.indexOf(active);
    if (dx < 0 && cur < keys.length - 1) activate(keys[cur + 1]);
    if (dx > 0 && cur > 0) activate(keys[cur - 1]);
  }
}, {passive:true});

// PWA service worker
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

// Boot — liminal iframe is already src'd in HTML for instant start
loaded.delete('liminal'); // will be set on onload
activate('liminal');

// Pre-warm amplify after liminal loads
$('f-liminal').addEventListener('load', () => {
  loaded.add('liminal');
  $('ld-liminal').classList.add('gone');
  setStatus('ok', 'NOMINAL');
  // Kick off lazy loads in background after 800ms
  setTimeout(() => {
    const fa = $('f-amplify');
    if (!fa.src) fa.src = 'amplify.html';
    const fn = $('f-nightvision');
    if (!fn.src) fn.src = 'nightvision.html';
  }, 800);
}, {once:true});
</script>
</body>
</html>
